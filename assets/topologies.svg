<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Parallel vs sequential topology">
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="720" height="200" rx="14" fill="#0b1220"/>

  <!-- PARALLEL -->
  <rect x="24" y="24" width="320" height="152" rx="12" fill="url(#panel)" stroke="#334155"/>
  <text x="184" y="52" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">parallel</text>
  <text x="184" y="70" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">one wave &#183; no dependencies</text>

  <rect x="56" y="96" width="108" height="40" rx="8" fill="#172554" stroke="#38bdf8"/>
  <text x="110" y="121" text-anchor="middle" fill="#bae6fd" font-family="ui-monospace, monospace" font-size="11">travel_agent</text>

  <rect x="204" y="96" width="108" height="40" rx="8" fill="#172554" stroke="#38bdf8"/>
  <text x="258" y="121" text-anchor="middle" fill="#bae6fd" font-family="ui-monospace, monospace" font-size="11">billing_agent</text>

  <rect x="56" y="96" width="256" height="40" rx="8" fill="none" stroke="#4ade80" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="184" y="158" text-anchor="middle" fill="#4ade80" font-family="ui-monospace, monospace" font-size="10">wave 1 &#183; run together</text>

  <!-- SEQUENTIAL -->
  <rect x="376" y="24" width="320" height="152" rx="12" fill="url(#panel)" stroke="#334155"/>
  <text x="536" y="52" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">sequential</text>
  <text x="536" y="70" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">chain &#183; depends_on edges</text>

  <rect x="408" y="96" width="108" height="40" rx="8" fill="#172554" stroke="#38bdf8"/>
  <text x="462" y="121" text-anchor="middle" fill="#bae6fd" font-family="ui-monospace, monospace" font-size="11">travel_agent</text>

  <rect x="556" y="96" width="108" height="40" rx="8" fill="#172554" stroke="#818cf8"/>
  <text x="610" y="121" text-anchor="middle" fill="#c7d2fe" font-family="ui-monospace, monospace" font-size="11">billing_agent</text>

  <path d="M 516 116 L 556 116" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="408" y="96" width="108" height="40" rx="8" fill="none" stroke="#4ade80" stroke-dasharray="6 4" opacity="0.8"/>
  <rect x="556" y="96" width="108" height="40" rx="8" fill="none" stroke="#fbbf24" stroke-dasharray="6 4" opacity="0.8"/>

  <text x="462" y="152" text-anchor="middle" fill="#4ade80" font-family="ui-monospace, monospace" font-size="10">wave 1</text>
  <text x="610" y="152" text-anchor="middle" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="10">wave 2</text>
  <text x="536" y="168" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">runs in order</text>
</svg>
