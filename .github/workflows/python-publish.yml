name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve release version from tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "RELEASE_VERSION=${TAG}" >> "$GITHUB_ENV"
          echo "Publishing plancontract ${TAG} from tag ${GITHUB_REF_NAME}"

      - name: Run tests
        run: |
          uv sync --frozen --all-groups
          uv run ruff format --check src tests
          uv run ruff check src tests
          uv run mypy src/plancontract
          uv run pytest

      - name: Build package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_PLANCONTRACT: ${{ env.RELEASE_VERSION }}
        run: uv build

      - name: Verify wheel version matches tag
        if: github.event_name == 'push'
        run: |
          BUILT="$(unzip -p dist/plancontract-*.whl 'plancontract-*.dist-info/METADATA' \
            | awk -F': ' '/^Version:/{print $2}')"
          if [ "${RELEASE_VERSION}" != "${BUILT}" ]; then
            echo "Tag v${RELEASE_VERSION} does not match wheel version ${BUILT}"
            exit 1
          fi

      - name: Publish to PyPI
        if: github.event_name == 'push'
        run: uv publish --trusted-publishing always
