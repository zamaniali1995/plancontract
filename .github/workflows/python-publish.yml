name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: |
          uv sync --frozen --all-groups
          uv run ruff format --check src tests
          uv run ruff check src tests
          uv run mypy src/plancontract
          uv run pytest

      - name: Build package
        run: uv build

      - name: Verify wheel version matches tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BUILT="$(unzip -p dist/plancontract-*.whl 'plancontract-*.dist-info/METADATA' \
            | awk -F': ' '/^Version:/{print $2}')"
          if [ "$TAG" != "$BUILT" ]; then
            echo "Tag v${TAG} does not match wheel version ${BUILT}"
            exit 1
          fi
          echo "Publishing plancontract ${BUILT}"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
